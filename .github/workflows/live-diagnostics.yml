name: Live provider diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  providers:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.12"
          enable-cache: true

      - name: Sync locked diagnostic environment
        run: uv sync --locked --extra test

      - name: Probe live providers
        run: uv run pytest -m live -rA
